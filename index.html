<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Klickknapp</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    #globalCount {
      font-size: 24px;
      margin-bottom: 20px;
    }

    #localCount {
      font-size: 18px;
      margin-top: 20px;
    }

    button {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: none;
      background: red;
      cursor: pointer;
      font-size: 18px;
      color: white;
      box-shadow: 0 0 30px rgba(255,0,0,0.6);
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div id="globalCount">Totala klick i världen: ...</div>

  <button id="clickBtn">KLICKA</button>

  <div id="localCount">Dina klick: 0</div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, setDoc, increment, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔴 ERSÄTT med din egen Firebase-konfiguration
    const firebaseConfig = {
      apiKey: "DIN_API_KEY",
      authDomain: "DIN_AUTH_DOMAIN",
      projectId: "DIN_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const counterRef = doc(db, "stats", "global");

    // Skapa dokumentet om det inte finns
    const snap = await getDoc(counterRef);
    if (!snap.exists()) {
      await setDoc(counterRef, { clicks: 0 });
    }

    // Lokala klick (sparas i webbläsaren)
    let localClicks = Number(localStorage.getItem("localClicks")) || 0;
    document.getElementById("localCount").innerText = `Dina klick: ${localClicks}`;

    // Lyssna på globala klick i realtid
    onSnapshot(counterRef, (doc) => {
      document.getElementById("globalCount").innerText =
        "Totala klick i världen: " + doc.data().clicks;
    });

    // Klick-händelse
    document.getElementById("clickBtn").addEventListener("click", async () => {
      await updateDoc(counterRef, { clicks: increment(1) });
      localClicks++;
      localStorage.setItem("localClicks", localClicks);
      document.getElementById("localCount").innerText = `Dina klick: ${localClicks}`;
    });
  </script>

</body>
</html>
