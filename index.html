<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fake Hacker Screen</title>
<style>
  body { margin:0; background:black; color:#00ff00; font-family:monospace; overflow:hidden; }
  canvas { position:fixed; inset:0; }
  #terminal { position:fixed; bottom:42px; width:100%; max-height:40vh; padding:12px; box-sizing:border-box; background:rgba(0,0,0,0.85); overflow-y:auto; border-top:1px solid #00ff00; }
  #commandInput { position:fixed; bottom:0; width:100%; padding:10px; background:black; color:#00ff00; border:none; border-top:1px solid #00ff00; font-family:monospace; outline:none; }
  .line { margin-bottom:6px; }
  .alert { color:#ff3333; }

  /* Screen effects */
  .flash { animation: flash 1.5s linear 1; }
  @keyframes flash { 0%{background:black;} 20%{background:#220000;} 40%{background:black;} 60%{background:#220000;} 80%{background:black;} 100%{background:black;} } 50%{background:#220000;} 100%{background:black;} }

  .shake { animation: shake 1.2s; }
  @keyframes shake { 0%{transform:translate(0,0);} 10%{transform:translate(-6px,4px);} 20%{transform:translate(6px,-4px);} 30%{transform:translate(-5px,3px);} 40%{transform:translate(5px,-3px);} 50%{transform:translate(-4px,2px);} 60%{transform:translate(4px,-2px);} 70%{transform:translate(-3px,2px);} 80%{transform:translate(3px,-2px);} 90%{transform:translate(-2px,1px);} 100%{transform:translate(0,0);} } 25%{transform:translate(-5px,3px);} 50%{transform:translate(5px,-3px);} 75%{transform:translate(-4px,2px);} 100%{transform:translate(0,0);} }

  .glitch { animation: glitch 1.4s; }
</style>
</head>
<body>
<canvas id="matrix"></canvas>
<div id="terminal"></div>
<input id="commandInput" placeholder="type a command and press Enter">

<script>
// ===== MATRIX =====
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); addEventListener('resize', resize);
const chars='01', fontSize=16;
let columns=Math.floor(canvas.width/fontSize), drops=new Array(columns).fill(1);
function drawMatrix(){
  ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='#00ff00'; ctx.font=fontSize+'px monospace';
  for(let i=0;i<drops.length;i++){ const c=chars[Math.floor(Math.random()*chars.length)]; ctx.fillText(c,i*fontSize,drops[i]*fontSize); if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0; drops[i]++; }
}
setInterval(drawMatrix,50);

// ===== TERMINAL =====
const terminal=document.getElementById('terminal');
const input=document.getElementById('commandInput');

function print(text, cls=''){ const d=document.createElement('div'); d.className='line '+cls; d.textContent=text; terminal.appendChild(d); terminal.scrollTop=terminal.scrollHeight; }

function flash(){ document.body.classList.add('flash'); setTimeout(()=>document.body.classList.remove('flash'),1600); }
function shake(){ document.body.classList.add('shake'); setTimeout(()=>document.body.classList.remove('shake'),1300); }
function glitch(){ document.body.classList.add('glitch'); setTimeout(()=>document.body.classList.remove('glitch'),1400); }

function progress(doneText){ let p=0; const bar=document.createElement('div'); bar.className='line'; terminal.appendChild(bar);
  const t=setInterval(()=>{ p+=10; bar.textContent='['+'█'.repeat(p/10)+'░'.repeat(10-p/10)+'] '+p+'%'; terminal.scrollTop=terminal.scrollHeight;
    if(p>=100){ clearInterval(t); print(doneText); }
  },300);
}

function countdown(){ let n=7; print('SELF DESTRUCT SEQUENCE STARTED','alert'); const t=setInterval(()=>{ print('T-minus '+n,'alert'); shake(); n--; if(n<0){ clearInterval(t); flash(); print('SEQUENCE ABORTED','alert'); } },900); } },700); }

input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && input.value.trim()!==''){
    const cmd=input.value.trim().toLowerCase(); input.value=''; print('> '+cmd);

    if(cmd==='help'){ print('Commands: help, clear, root, inject, selfdestruct'); return; }
    if(cmd==='clear'){ terminal.innerHTML=''; return; }
    if(cmd==='root'){ print('ROOT ACCESS GRANTED'); flash(); glitch(); return; }
    if(cmd==='inject'){ glitch(); progress('Injection successful.'); return; }
    if(cmd==='selfdestruct'){ flash(); countdown(); return; }

    ['Executing...','Scanning...','Process complete.'].forEach((t,i)=>setTimeout(()=>print(t),400*(i+1)));
  }
});
</script>
</body>
</html>
