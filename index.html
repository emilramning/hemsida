<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fake Hacker Screen</title>
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
  }

  #terminal {
    position: fixed;
    bottom: 0;
    width: 100%;
    max-height: 40vh;
    padding: 15px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.85);
    overflow-y: auto;
    border-top: 1px solid #00ff00;
  }

  .line {
    margin-bottom: 6px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="terminal"></div>
<input id="commandInput" placeholder="type a command and press Enter" style="position:fixed;bottom:0;left:0;width:100%;padding:10px;background:black;color:#00ff00;border:none;border-top:1px solid #00ff00;font-family:monospace;box-sizing:border-box;outline:none;" />

<script>
// ===== MATRIX RAIN =====
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = '01';
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) {
  drops[x] = Math.random() * canvas.height;
}

function drawMatrix() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = '#00ff00';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const text = letters[Math.floor(Math.random() * letters.length)];
    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

// ===== FAKE TERMINAL TEXT =====
const terminal = document.getElementById('terminal');

const fakeLines = [
  'Initializing secure connection...',
  'Bypassing firewall layer 1...',
  'Accessing encrypted node...',
  'Decrypting packets [##########] 100%',
  'Uploading payload...',
  'Verifying access token...',
  'Connection established.',
  'Downloading data stream...',
  'Process completed successfully.'
];

let lineIndex = 0;

function addLine() {
  if (lineIndex >= fakeLines.length) {
    lineIndex = 0;
    terminal.innerHTML = '';
  }

  const div = document.createElement('div');
  div.className = 'line';
  div.textContent = '> ' + fakeLines[lineIndex];
  terminal.appendChild(div);
  terminal.scrollTop = terminal.scrollHeight;
  lineIndex++;
}

setInterval(addLine, 900);

// ===== USER INPUT =====
const input = document.getElementById('commandInput');

const responses = [
  'Command accepted.',
  'Executing...',
  'Permission granted.',
  'Access denied. Retrying...',
  'Process injected successfully.'
];

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim() !== '') {
    const userLine = document.createElement('div');
    userLine.className = 'line';
    userLine.textContent = '> ' + input.value;
    terminal.appendChild(userLine);

    const response = document.createElement('div');
    response.className = 'line';
    response.textContent = responses[Math.floor(Math.random() * responses.length)];
    terminal.appendChild(response);

    terminal.scrollTop = terminal.scrollHeight;
    input.value = '';
  }
});

// ===== RESIZE =====
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
