<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fake Hacker Terminal</title>
<style>
  body {
    margin: 0;
    background: black;
    color: #00ff00;
    font-family: monospace;
    overflow: hidden;
  }

  canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #terminal {
    position: fixed;
    bottom: 42px;
    width: 100%;
    max-height: 40vh;
    padding: 12px;
    box-sizing: border-box;
    background: rgba(0, 0, 0, 0.85);
    overflow-y: auto;
    border-top: 1px solid #00ff00;
    z-index: 2;
  }

  #commandInput {
    position: fixed;
    bottom: 0;
    width: 100%;
    padding: 10px;
    background: black;
    color: #00ff00;
    border: none;
    border-top: 1px solid #00ff00;
    font-family: monospace;
    outline: none;
    z-index: 2;
  }

  .line { margin-bottom: 6px; }
  .alert { color: #ff3333; }

  /* EFFECTS */
  .flash {
    animation: flash 1.5s linear;
  }

  @keyframes flash {
    0% { background: black; }
    25% { background: #220000; }
    50% { background: black; }
    75% { background: #220000; }
    100% { background: black; }
  }

  .shake {
    animation: shake 1.2s;
  }

  @keyframes shake {
    0% { transform: translate(0, 0); }
    20% { transform: translate(-6px, 4px); }
    40% { transform: translate(6px, -4px); }
    60% { transform: translate(-4px, 3px); }
    80% { transform: translate(4px, -3px); }
    100% { transform: translate(0, 0); }
  }

  .glitch {
    animation: glitch 1.4s;
  }

  @keyframes glitch {
    0% { filter: none; }
    20% { filter: hue-rotate(60deg) contrast(1.5); }
    40% { filter: none; }
    60% { filter: hue-rotate(-60deg) contrast(2); }
    80% { filter: none; }
    100% { filter: none; }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>
<div id="terminal"></div>
<input id="commandInput" placeholder="type a command and press Enter" />

<script>
// MATRIX BACKGROUND
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

const chars = '01';
const fontSize = 16;
let columns = Math.floor(canvas.width / fontSize);
let drops = new Array(columns).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff00';
  ctx.font = fontSize + 'px monospace';

  for (let i = 0; i < drops.length; i++) {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * fontSize, drops[i] * fontSize);
    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
      drops[i] = 0;
    }
    drops[i]++;
  }
}
setInterval(drawMatrix, 50);

// TERMINAL
const terminal = document.getElementById('terminal');
const input = document.getElementById('commandInput');

function print(text, cls = '') {
  const line = document.createElement('div');
  line.className = 'line ' + cls;
  line.textContent = text;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

function flash() {
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 1500);
}

function shake() {
  document.body.classList.add('shake');
  setTimeout(() => document.body.classList.remove('shake'), 1200);
}

function glitch() {
  document.body.classList.add('glitch');
  setTimeout(() => document.body.classList.remove('glitch'), 1400);
}

function progress(doneText) {
  let p = 0;
  const bar = document.createElement('div');
  bar.className = 'line';
  terminal.appendChild(bar);

  const timer = setInterval(() => {
    p += 10;
    bar.textContent = '[' + '█'.repeat(p / 10) + '░'.repeat(10 - p / 10) + '] ' + p + '%';
    terminal.scrollTop = terminal.scrollHeight;
    if (p >= 100) {
      clearInterval(timer);
      print(doneText);
    }
  }, 300);
}

function countdown() {
  let n = 7;
  print('SELF DESTRUCT SEQUENCE STARTED', 'alert');
  const timer = setInterval(() => {
    print('T-minus ' + n, 'alert');
    shake();
    n--;
    if (n < 0) {
      clearInterval(timer);
      flash();
      print('SEQUENCE ABORTED', 'alert');
    }
  }, 900);
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && input.value.trim() !== '') {
    const cmd = input.value.trim().toLowerCase();
    input.value = '';
    print('> ' + cmd);

    if (cmd === 'help') {
      print('Commands: help, clear, root, inject, selfdestruct');
      return;
    }

    if (cmd === 'clear') {
      terminal.innerHTML = '';
      return;
    }

    if (cmd === 'root') {
      print('ROOT ACCESS GRANTED');
      flash();
      glitch();
      return;
    }

    if (cmd === 'inject') {
      glitch();
      progress('Injection successful.');
      return;
    }

    if (cmd === 'selfdestruct') {
      flash();
      countdown();
      return;
    }

    print('Unknown command');
  }
});

print('System online. Type "help"');
</script>
</body>
</html>
