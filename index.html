<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Story Universe</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  h1 { margin-bottom: 20px; text-align: center; }
  #story { max-width: 600px; text-align: center; font-size: 20px; margin-bottom: 30px; }
  .choice { background: red; color: white; padding: 10px 20px; margin: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: transform 0.1s; }
  .choice:hover { transform: scale(1.05); }
  .scene-img { max-width: 500px; border-radius: 10px; margin-bottom: 20px; transition: all 0.5s ease; }
</style>
</head>
<body>

<h1>Interactive Story Universe</h1>
<div id="story"></div>
<div id="choices"></div>
<img id="sceneImage" class="scene-img" src="" alt="Scene Image" />

<script>
// Story definition
const story = {
  start: {
    text: "You awaken on a mysterious planet with two paths ahead.",
    image: "https://i.imgur.com/3p6b9xK.jpg",
    choices: [
      { text: "Explore the forest", next: "forest" },
      { text: "Head to the city", next: "city" }
    ]
  },
  forest: {
    text: "The forest is dense and dark. You see a glowing object.",
    image: "https://i.imgur.com/Ou7h4hX.jpg",
    choices: [
      { text: "Pick up the object", next: "treasure" },
      { text: "Ignore it and move on", next: "monster" }
    ]
  },
  city: {
    text: "The city is bustling with strange creatures. A merchant waves at you.",
    image: "https://i.imgur.com/7Kz8ZmF.jpg",
    choices: [
      { text: "Talk to the merchant", next: "merchant" },
      { text: "Sneak through the alleys", next: "alley" }
    ]
  },
  treasure: {
    text: "You found a magical artifact! You feel powerful.",
    image: "https://i.imgur.com/yQZ6VtB.jpg",
    choices: [
      { text: "Continue exploring", next: "forestEnd" }
    ]
  },
  monster: {
    text: "A monster appears! You run for your life.",
    image: "https://i.imgur.com/0iWlJzP.jpg",
    choices: [
      { text: "Climb a tree", next: "forestEnd" },
      { text: "Fight", next: "lose" }
    ]
  },
  forestEnd: {
    text: "You safely exit the forest. Your adventure continues...",
    image: "https://i.imgur.com/3p6b9xK.jpg",
    choices: [
      { text: "Restart", next: "start" }
    ]
  },
  merchant: {
    text: "The merchant gives you a mysterious map.",
    image: "https://i.imgur.com/EhJ9v8p.jpg",
    choices: [
      { text: "Follow the map", next: "cityEnd" },
      { text: "Ignore it", next: "cityEnd" }
    ]
  },
  alley: {
    text: "You find a hidden treasure chest in the alley!",
    image: "https://i.imgur.com/yQZ6VtB.jpg",
    choices: [
      { text: "Open it", next: "cityEnd" },
      { text: "Leave it", next: "cityEnd" }
    ]
  },
  cityEnd: {
    text: "You finish your city adventure. Well done!",
    image: "https://i.imgur.com/7Kz8ZmF.jpg",
    choices: [
      { text: "Restart", next: "start" }
    ]
  },
  lose: {
    text: "The monster defeats you. Game over!",
    image: "https://i.imgur.com/0iWlJzP.jpg",
    choices: [
      { text: "Restart", next: "start" }
    ]
  }
};

// Load state from localStorage
let currentScene = localStorage.getItem('currentScene') || 'start';

const storyDiv = document.getElementById('story');
const choicesDiv = document.getElementById('choices');
const sceneImage = document.getElementById('sceneImage');

function renderScene(sceneKey) {
  const scene = story[sceneKey];
  storyDiv.textContent = scene.text;
  sceneImage.src = scene.image;
  choicesDiv.innerHTML = '';

  scene.choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = choice.text;
    btn.addEventListener('click', () => {
      currentScene = choice.next;
      localStorage.setItem('currentScene', currentScene);
      renderScene(currentScene);
    });
    choicesDiv.appendChild(btn);
  });
}

renderScene(currentScene);
</script>

</body>
</html>
