<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolig Hemsida</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f7f7f7;
      text-align: center;
    }

    header {
      background: #ff8c00;
      color: white;
      padding: 30px 0;
      font-size: 2rem;
      font-weight: bold;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    button {
      font-size: 1.2rem;
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ff8c00;
      color: white;
      margin-top: 20px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.1);
      background: #e67d00;
    }

    #joke {
      margin-top: 25px;
      font-size: 1.4rem;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    Välkommen till den Roligaste Hemsidan! 😆
  </header>

  <div class="container">
    <h2>Klicka på knappen för ett slumpat skämt!</h2>
    <button onclick="showJoke()">Ge mig ett skämt!</button>
    <p id="joke"></p>
  </div>

  <script>
    const jokes = [
      "Varför kan inte spöken ljuga? För man ser rakt igenom dem! 👻",
      "Vad kallar man en kanin med loppor? Bugs Bunny! 🐰",
      "Varför går skelett aldrig ut och slåss? De har inget hjärta! 💀",
      "Jag försökte fånga dimma igår… det var lönlöst. 🌫️",
      "Varför äter inte datorer snacks? För de är rädda att få chips! 💻"
    ];

    function showJoke() {
      const randomIndex = Math.floor(Math.random() * jokes.length);
      document.getElementById("joke").innerText = jokes[randomIndex];
    }
  </script>

</body>
</html>
