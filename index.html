<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Red Button</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #count {
      font-size: 28px;
      margin-bottom: 25px;
    }

    button {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: red;
      color: white;
      font-size: 22px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 35px rgba(255,0,0,0.7);
    }

    button:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div id="count">Clicks: 0</div>
  <button id="btn">CLICK</button>

  <script>
    let clicks = Number(localStorage.getItem("clicks")) || 0;
    const countEl = document.getElementById("count");
    const btn = document.getElementById("btn");

    countEl.textContent = "Clicks: " + clicks;

    btn.addEventListener("click", () => {
      clicks++;
      localStorage.setItem("clicks", clicks);
      countEl.textContent = "Clicks: " + clicks;
    });
  </script>

</body>
</html>
