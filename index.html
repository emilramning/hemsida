<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme Generator</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    input, button {
      padding: 10px;
      font-size: 16px;
      margin: 5px;
      border-radius: 5px;
      border: none;
    }

    button {
      cursor: pointer;
      background: red;
      color: white;
      font-weight: bold;
      transition: transform 0.1s ease;
    }

    button:active {
      transform: scale(0.95);
    }

    #memeContainer {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .meme {
      position: relative;
      max-width: 500px;
      margin-bottom: 20px;
      animation: fadeIn 0.8s ease;
    }

    .meme img {
      width: 100%;
      border-radius: 10px;
    }

    .memeText {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 2px 2px 4px black;
      text-align: center;
      animation: textPop 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes textPop {
      from { transform: translateX(-50%) scale(0.8); }
      to { transform: translateX(-50%) scale(1); }
    }

  </style>
</head>
<body>
  <h1>Meme Generator with Twist</h1>
  <input type="text" id="memeText" placeholder="Enter your text..." />
  <button id="generate">Generate Meme</button>

  <div id="memeContainer"></div>

  <script>
    const memeContainer = document.getElementById('memeContainer');
    const memeTextInput = document.getElementById('memeText');
    const generateBtn = document.getElementById('generate');

    // Example meme images (can add more URLs)
    const memeImages = [
      'https://i.imgflip.com/30b1gx.jpg',
      'https://i.imgflip.com/26am.jpg',
      'https://i.imgflip.com/1otk96.jpg',
      'https://i.imgflip.com/9ehk.jpg',
      'https://i.imgflip.com/3si4.jpg'
    ];

    function generateMeme() {
      const text = memeTextInput.value.trim();
      if (!text) return;

      const imgUrl = memeImages[Math.floor(Math.random() * memeImages.length)];

      const memeDiv = document.createElement('div');
      memeDiv.className = 'meme';

      const img = document.createElement('img');
      img.src = imgUrl;

      const textDiv = document.createElement('div');
      textDiv.className = 'memeText';
      textDiv.textContent = text;

      memeDiv.appendChild(img);
      memeDiv.appendChild(textDiv);
      memeContainer.prepend(memeDiv);

      memeTextInput.value = '';
    }

    generateBtn.addEventListener('click', generateMeme);

    // Optional: generate meme on Enter key
    memeTextInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') generateMeme();
    });
  </script>
</body>
</html>
